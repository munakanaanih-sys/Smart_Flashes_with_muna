<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ومضات ذكية مع منى مصطفى</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rubik:wght@400;500;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* ===== متغيرات الألوان والتصميم ===== */
        :root {
            --rainbow-red:    #ff4757;
            --rainbow-orange: #ffa502;
            --rainbow-yellow: #eccc68;
            --rainbow-green:  #2ed573;
            --rainbow-blue:   #1e90ff;
            --rainbow-purple: #9c27b0;
            --bg-light:  #f8f9fa;
            --card-bg:   #ffffff;
            --text-dark: #2f3542;
            --text-muted: #57606f;
        }

        /* ===== إعادة تعيين أساسية بدون transition عام ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', 'Rubik', 'Poppins', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية ناعمة */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg,
                rgba(255, 71, 87,  0.04),
                rgba(255, 165, 2,  0.04),
                rgba(46,  213, 115, 0.04),
                rgba(30,  144, 255, 0.04));
            z-index: -1;
            pointer-events: none;
        }

        /* ===== شريط التنقل العلوي ===== */
        .top-nav {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 0 20px;
            margin-bottom: 20px;
            z-index: 100;
        }

        /* ===== زر لمحة عني ===== */
        .about-btn {
            background: white;
            color: var(--rainbow-blue);
            border: 2px solid var(--rainbow-blue);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(30, 144, 255, 0.1);
            position: relative;
            /* transition محددة فقط على الخصائص المطلوبة */
            transition: background-color 0.3s ease, color 0.3s ease,
                        transform 0.3s ease, box-shadow 0.3s ease;
        }

        .about-btn:hover,
        .about-btn:focus-visible {
            background: var(--rainbow-blue);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 144, 255, 0.25);
            outline: none;
        }

        /* ===== مبدل اللغة ===== */
        .lang-switcher {
            display: flex;
            gap: 8px;
            background: white;
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .lang-btn {
            border: none;
            background: none;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 25px;
            font-family: inherit;
            color: #747d8c;
            transition: background-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
        }

        .lang-btn:hover:not(.active) {
            background: rgba(30, 144, 255, 0.08);
            color: var(--rainbow-blue);
        }

        .lang-btn.active {
            background: linear-gradient(45deg, var(--rainbow-blue), #00d2d3);
            color: white;
            box-shadow: 0 4px 12px rgba(30, 144, 255, 0.3);
        }

        /* ===== رأس الصفحة ===== */
        header {
            text-align: center;
            margin-bottom: 50px;
            max-width: 800px;
            padding: 0 20px;
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg,
                var(--rainbow-red),
                var(--rainbow-orange),
                var(--rainbow-green),
                var(--rainbow-blue),
                var(--rainbow-purple));
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: white;
            /* تحسين: يعرض مؤقتاً لون إذا فشل تحميل الصورة */
            background-color: #e8f4fd;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff4757, #1e90ff, #2ed573);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 500;
            line-height: 1.6;
        }

        /* ===== شبكة الكروت ===== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            padding: 10px 20px;
        }

        .platform-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-dark);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 2px solid transparent;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 170px;
            /* transition محددة فقط */
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        /* كرت معطل (رابط فارغ #) */
        .platform-card.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .platform-card:not(.disabled):focus-visible {
            outline: 3px solid var(--rainbow-blue);
            outline-offset: 3px;
        }

        .platform-card:nth-child(4n+1):not(.disabled):hover { border-color: var(--rainbow-red);    box-shadow: 0 12px 25px rgba(255, 71,  87,  0.12); transform: translateY(-5px); }
        .platform-card:nth-child(4n+2):not(.disabled):hover { border-color: var(--rainbow-orange);  box-shadow: 0 12px 25px rgba(255, 165,  2,  0.12); transform: translateY(-5px); }
        .platform-card:nth-child(4n+3):not(.disabled):hover { border-color: var(--rainbow-green);   box-shadow: 0 12px 25px rgba(46,  213, 115, 0.12); transform: translateY(-5px); }
        .platform-card:nth-child(4n+4):not(.disabled):hover { border-color: var(--rainbow-blue);    box-shadow: 0 12px 25px rgba(30,  144, 255, 0.12); transform: translateY(-5px); }

        .platform-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .ai-badge {
            background: rgba(30, 144, 255, 0.08);
            color: var(--rainbow-blue);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 10px;
            display: inline-block;
        }

        /* شارة "قريباً" للكروت المعطلة */
        .coming-soon-badge {
            background: rgba(255, 165, 2, 0.1);
            color: var(--rainbow-orange);
            border: 1px solid rgba(255, 165, 2, 0.3);
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 6px;
            display: inline-block;
        }

        /* ===== Tooltip (بالون توضيحي) ===== */
        .tooltip-text {
            visibility: hidden;
            width: 260px;
            background-color: #2f3542;
            color: #ffffff;
            text-align: center;
            border-radius: 12px;
            padding: 12px;
            position: absolute;
            z-index: 10;
            opacity: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            font-size: 0.85rem;
            line-height: 1.5;
            pointer-events: none;
            font-weight: 400;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        /* Tooltip للكروت — يظهر للأعلى */
        .platform-card .tooltip-text {
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
        }
        .platform-card .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%; left: 50%; margin-left: -6px;
            border-width: 6px; border-style: solid;
            border-color: #2f3542 transparent transparent transparent;
        }
        .platform-card:not(.disabled):hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            bottom: 120%;
        }

        /* Tooltip لزر لمحة عني — يظهر للأسفل */
        .about-btn .tooltip-text {
            top: 125%;
            left: 50%;
            transform: translateX(-50%);
        }
        .about-btn .tooltip-text::after {
            content: "";
            position: absolute;
            bottom: 100%; left: 50%; margin-left: -6px;
            border-width: 6px; border-style: solid;
            border-color: transparent transparent #2f3542 transparent;
        }
        .about-btn:hover .tooltip-text,
        .about-btn:focus-visible .tooltip-text {
            visibility: visible;
            opacity: 1;
            top: 135%;
        }

        /* ===== تذييل الصفحة ===== */
        footer {
            margin-top: auto;
            padding: 40px 20px 20px 20px;
            color: #a4b0be;
            font-size: 0.9rem;
            text-align: center;
        }

        /* ===== توجيه الخطوط حسب اللغة ===== */
        html[dir="ltr"] .tooltip-text,
        html[lang="en"] * { font-family: 'Poppins', sans-serif; }
        html[dir="rtl"] .tooltip-text { font-family: 'Cairo', sans-serif; }

        /* ===== تقليل الحركة لمن يفضل ذلك ===== */
        @media (prefers-reduced-motion: reduce) {
            .platform-card,
            .about-btn,
            .lang-btn,
            .tooltip-text {
                transition: none;
            }
        }

        /* ===== رسائل الحالة (تحميل / خطأ) ===== */
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 600;
        }
        .status-msg.error {
            color: var(--rainbow-red);
        }
        .status-msg .retry-btn {
            display: block;
            margin: 14px auto 0 auto;
            background: var(--rainbow-blue);
            color: white;
            border: none;
            padding: 10px 26px;
            border-radius: 30px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            font-size: 0.95rem;
        }

        /* ===== الشاشات الصغيرة ===== */
        @media (max-width: 600px) {
            .top-nav {
                flex-direction: column-reverse;
                gap: 15px;
                padding-top: 15px;
            }
            h1 { font-size: 1.8rem; }
            .grid-container { gap: 16px; }
            .platform-card { height: auto; min-height: 150px; padding: 22px 16px; }
        }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <div class="top-nav">
        <!-- زر لمحة عني — مع cache-buster في الرابط لتجنب مشكلة المتصفح -->
        <a href="https://munakanaanih-sys.github.io/about_me/"
           target="_blank"
           rel="noopener noreferrer"
           class="about-btn"
           id="about-link">
            <span id="about-btn-text">ℹ️ لمحة عني</span>
            <span class="tooltip-text" id="about-tooltip-text">كل ما تحتاجون معرفته عني في صفحة واحدة</span>
        </a>

        <!-- أزرار اللغات -->
        <div class="lang-switcher" role="group" aria-label="اختيار اللغة">
            <button class="lang-btn active" onclick="switchLanguage('ar')" lang="ar">العربية</button>
            <button class="lang-btn" onclick="switchLanguage('he')" lang="he">עברית</button>
            <button class="lang-btn" onclick="switchLanguage('en')" lang="en">English</button>
        </div>
    </div>

    <!-- رأس الصفحة -->
    <header>
        <div class="logo-container">
            <img src="https://i.postimg.cc/SNgVgv8L/my-new-icon.png"
                 alt="شعار ومضات ذكية"
                 class="logo-img"
                 width="130"
                 height="130">
        </div>
        <h1 id="main-title">ومضات ذكية مع منى مصطفى</h1>
        <p class="subtitle" id="main-subtitle">منصة الأدوات التفاعلية وتطبيقات الذكاء الاصطناعي للمعلمين</p>
    </header>

    <!-- شبكة المنصات -->
    <main class="grid-container" id="platforms-grid" aria-label="قائمة الأدوات">
        <p id="loading-msg" class="status-msg">⏳ جاري تحميل الأدوات...</p>
    </main>

    <!-- تذييل الصفحة -->
    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة — المعلمة ومركزة التقييم منى مصطفى - كناعنة</p>
    </footer>

    <script>
        // ===== 1. نصوص الواجهة لكل لغة =====
        const interfaceTexts = {
            ar: {
                title:        "ومضات ذكية مع منى مصطفى",
                subtitle:     "منصة الأدوات التفاعلية وتطبيقات الذكاء الاصطناعي للمعلمين",
                aiBadge:      "ذكاء اصطناعي ✨",
                comingSoon:   "⏳ قريباً",
                aboutBtn:     "ℹ️ لمحة عني",
                aboutTooltip: "كل ما تحتاجون معرفته عني في صفحة واحدة"
            },
            he: {
                title:        "הבזקים חכמים עם מונא מוסטפא",
                subtitle:     "פלטפורמת כלים אינטראקטיביים ויישומי בינה מלאכותית למורים",
                aiBadge:      "בינה מלאכותית ✨",
                comingSoon:   "⏳ בקרוב",
                aboutBtn:     "ℹ️ מי אני?",
                aboutTooltip: "כל מה שאתם צריכים לדעת עליי בעמוד אחד"
            },
            en: {
                title:        "Smart Flashes with Muna Mustafa",
                subtitle:     "Interactive Tools & AI Applications Platform for Teachers",
                aiBadge:      "AI Tool ✨",
                comingSoon:   "⏳ Coming Soon",
                aboutBtn:     "ℹ️ About Me",
                aboutTooltip: "Everything you need to know about me on one page"
            }
        };

        // ===== 2. إعدادات الاتصال بجوجل شيتس =====
        // معرّف الملف ورقم التبويبة (gid) — خذيهم من رابط الشيت
        const SHEET_ID = "14fwLbzknnZDgMptGIj8qVY0eaCdY_V-zUxhbLE769No";
        const SHEET_GID = "0";
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;

        // ترتيب الأعمدة الثابت في الشيت:
        // A=اسم عربي, B=اسم عبري, C=اسم إنجليزي, D=tooltip عربي, E=tooltip عبري, F=tooltip إنجليزي, G=الرابط
        let platformsData = [];

        // ===== 3. دالة جلب البيانات من جوجل شيتس =====
        // ملاحظة: صف "لمحة عني" (About Me) موجود بالشيت كأي صف عادي،
        // لكن لازم يُستثنى من شبكة الكروت لأنه معروض كزر ثابت بأعلى الصفحة فقط
        const ABOUT_ME_KEYWORDS = ['لمحة عني', 'מי אני', 'about me'];
        const HEADER_KEYWORDS = ['اسم الزر بالعربية', 'שם הכפתור', 'button name'];

        function isAboutMeRow(item) {
            const allTitles = [item.title.ar, item.title.he, item.title.en]
                .map(t => t.toLowerCase().trim());
            return ABOUT_ME_KEYWORDS.some(keyword =>
                allTitles.includes(keyword.toLowerCase())
            );
        }

        function isHeaderRow(item) {
            const normalizedTitle = item.title.ar.toLowerCase().trim();
            return HEADER_KEYWORDS.some(keyword =>
                normalizedTitle.includes(keyword.toLowerCase().trim())
            );
        }

        async function fetchPlatformsData() {
            const response = await fetch(SHEET_URL);
            if (!response.ok) throw new Error('فشل الاتصال بالشيت: ' + response.status);

            const rawText = await response.text();

            // استجابة gviz تأتي ملفوفة بنص إضافي قبل/بعد الـ JSON، لازم نستخرجه
            const jsonStart = rawText.indexOf('{');
            const jsonEnd = rawText.lastIndexOf('}');
            const jsonText = rawText.substring(jsonStart, jsonEnd + 1);
            const parsed = JSON.parse(jsonText);

            const rows = parsed.table.rows;

            // الصف الأول في الشيت هو دائماً صف العناوين (الهيدر) حسب بنية الملف الثابتة
            // نتجاهله مباشرة بغض النظر عن محتواه، كحماية أولى أكيدة
            const dataRows = rows.slice(1);

            const data = dataRows
                .map(row => {
                    const cells = row.c;
                    const getVal = (idx) => (cells[idx] && cells[idx].v != null) ? String(cells[idx].v).trim() : '';

                    return {
                        title: {
                            ar: getVal(0),
                            he: getVal(1),
                            en: getVal(2)
                        },
                        desc: {
                            ar: getVal(3),
                            he: getVal(4),
                            en: getVal(5)
                        },
                        url: getVal(6) || '#'
                    };
                })
                // تجاهل الصفوف الفارغة بالكامل (مثلاً صف بدون اسم عربي)
                .filter(item => item.title.ar !== '')
                // استثناء صف العناوين (الهيدر) كحماية إضافية احتياطية
                .filter(item => !isHeaderRow(item))
                // استثناء صف "لمحة عني" من شبكة الكروت (له زر ثابت خاص بأعلى الصفحة)
                .filter(item => !isAboutMeRow(item));

            return data;
        }

        // ===== 5. دالة تبديل اللغة (تغيّر فقط النصوص، بدون إعادة جلب) =====
        function switchLanguage(lang) {
            const html = document.documentElement;
            html.lang = lang;
            html.dir  = (lang === 'en') ? 'ltr' : 'rtl';

            // تحديث أزرار اللغة
            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                const map = ['ar', 'he', 'en'];
                btn.classList.toggle('active', map[i] === lang);
            });

            // تحديث عنوان الصفحة ووسومه meta
            const texts = interfaceTexts[lang];
            document.title = texts.title;
            document.getElementById('main-title').textContent    = texts.title;
            document.getElementById('main-subtitle').textContent = texts.subtitle;
            document.getElementById('about-btn-text').textContent    = texts.aboutBtn;
            document.getElementById('about-tooltip-text').textContent = texts.aboutTooltip;

            // إعادة رسم الشبكة بالبيانات الموجودة حالياً (بدون إعادة جلب من الشيت)
            renderDashboard(lang);
        }

        // ===== 6. دالة بناء كروت المنصات =====
        function renderDashboard(lang) {
            const grid = document.getElementById('platforms-grid');
            grid.innerHTML = '';

            const texts = interfaceTexts[lang];

            platformsData.forEach(item => {
                const isDisabled = item.url === '#' || item.url === '';

                // العنصر: <a> إذا كان نشطاً، <div> إذا كان معطلاً
                const card = document.createElement(isDisabled ? 'div' : 'a');
                card.className = 'platform-card' + (isDisabled ? ' disabled' : '');

                if (!isDisabled) {
                    card.href   = item.url;
                    card.target = '_blank';
                    card.rel    = 'noopener noreferrer';
                }

                // عنوان الأداة
                const title = document.createElement('div');
                title.className   = 'platform-title';
                title.textContent = item.title[lang] || item.title.ar;
                card.appendChild(title);

                // شارة: "ذكاء اصطناعي" أو "قريباً"
                const badge = document.createElement('span');
                if (isDisabled) {
                    badge.className   = 'coming-soon-badge';
                    badge.textContent = texts.comingSoon;
                } else {
                    badge.className   = 'ai-badge';
                    badge.textContent = texts.aiBadge;
                }
                card.appendChild(badge);

                // Tooltip
                const tooltip = document.createElement('span');
                tooltip.className   = 'tooltip-text';
                tooltip.textContent = item.desc[lang] || item.desc.ar;
                card.appendChild(tooltip);

                grid.appendChild(card);
            });
        }

        // ===== 7. عرض رسالة خطأ مع زر إعادة محاولة =====
        function renderError() {
            const grid = document.getElementById('platforms-grid');
            grid.innerHTML = `
                <p class="status-msg error">
                    ⚠️ تعذّر تحميل قائمة الأدوات. تأكدي من اتصال الإنترنت وأن ملف جوجل شيتس متاح للعرض للجميع.
                    <button class="retry-btn" id="retry-btn" type="button">إعادة المحاولة</button>
                </p>`;
            document.getElementById('retry-btn').addEventListener('click', initApp);
        }

        // ===== 8. تشغيل التطبيق: جلب البيانات ثم عرضها =====
        async function initApp() {
            const grid = document.getElementById('platforms-grid');
            grid.innerHTML = '<p id="loading-msg" class="status-msg">⏳ جاري تحميل الأدوات...</p>';

            try {
                platformsData = await fetchPlatformsData();
                switchLanguage('ar');
            } catch (err) {
                console.error('خطأ في جلب بيانات جوجل شيتس:', err);
                renderError();
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
